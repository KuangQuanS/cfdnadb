spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:cfdnadb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}

app:
  data-dir: ${APP_DATA_DIR:/400T/cfdnaweb}
  query-db-file: ${APP_QUERY_DB_FILE:cfdnadb.duckdb}
  maf-db-file: ${APP_MAF_DB_FILE:maf.duckdb}
  tcga-igv-file: ${APP_TCGA_IGV_FILE:/400T/cfdnaweb/tcga_maf.txt}
  pan-cancer-dir: ${APP_PAN_CANCER_DIR:/400T/cfdnaweb/statistics/oncoplot/pan_cancer}
  vaf-data-dir: ${APP_VAF_DATA_DIR:/400T/cfdnadb/MAF_all/PDF/PAN_cancer/cfDNA_VAF}
  tcga-dir: ${APP_TCGA_DIR:/400T/cfDNAweb/tcga}
  maf-import:
    enabled: ${APP_MAF_IMPORT_ENABLED:false}
    exit-after-run: ${APP_MAF_IMPORT_EXIT_AFTER_RUN:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
